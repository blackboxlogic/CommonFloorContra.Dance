name: Build and deploy ProxyByRegex to Azure Function App - cfcdcalendarfunctionappservice/test

on:
  push:
    branches:
      - master
    paths:
      - 'ProxyByRegex/**'
      - '.github/workflows/deploy-proxybyregex-test.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: cfcdcalendarfunctionappservice
  AZURE_FUNCTIONAPP_SLOT: test
  AZURE_FUNCTIONAPP_PACKAGE_PATH: ProxyByRegex
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        shell: bash
        run: |
          pushd '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet publish --configuration Release --runtime linux-x64 --self-contained false --output ./output
          popd

      - name: Deploy to Azure Functions (test slot)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          slot-name: ${{ env.AZURE_FUNCTIONAPP_SLOT }}
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_PROXYBYREGEX_TEST }}
